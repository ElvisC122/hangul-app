<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hangul Minimal Test</title>
  <style> body{font-family:sans-serif;padding:20px} #c{font-size:80px} </style>
</head>
<body>
  <h1>Hangul Minimal Test</h1>
  <div id="c">ㅏ</div>
  <div id="h">a</div>
  <input id="ans" placeholder="type a / eo / ...">
  <button id="chk">Check</button>
  <button id="nxt">Next</button>
  <div id="res"></div>
  <script>
    const vowels=[{h:'ㅏ',r:'a'},{h:'ㅑ',r:'ya'},{h:'ㅓ',r:'eo'},{h:'ㅕ',r:'yeo'},{h:'ㅗ',r:'o'},{h:'ㅛ',r:'yo'},{h:'ㅜ',r:'u'},{h:'ㅠ',r:'yu'},{h:'ㅡ',r:'eu'},{h:'ㅣ',r:'i'}];
    let cur=vowels[0];
    const $=s=>document.querySelector(s);
    function next(){ cur=vowels[Math.floor(Math.random()*vowels.length)]; $('#c').textContent=cur.h; $('#h').textContent=cur.r; $('#ans').value=''; $('#res').textContent=''; }
    function check(){ const a=$('#ans').value.trim().toLowerCase(); $('#res').textContent = (a===cur.r)?'OK':'Wrong: '+cur.r; }
    $('#chk').onclick=check; $('#nxt').onclick=next;
    next();
  </script>
</body>
</html>
