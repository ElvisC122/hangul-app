<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>韓文 40 音 — 關卡訓練＋配對模式</title>
  <meta name="description" content="Hangul trainer with easy unlock (section total 20 pts), modal animation, daily streak, themed hover romanization, mixed review slider, match mode (keyboard), reaction timer and error weighting.">
  <style>
    /* ===== 主題 ===== */
    :root{
      --bg-start:#071a2a; --bg-end:#0b2c4a;
      --card: rgba(17,24,39,.55);
      --glass: blur(10px);
      --text:#e6f2ff; --muted:#9cc0dd;
      --accent:#3b82f6; --accent2:#06b6d4;
      --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b;
      --chip:#0b2540; --chip-border:rgba(148,163,184,.25);
      --list-bg: rgba(2,6,23,.35); --list-border: rgba(148,163,184,.3);
      --shadow: rgba(0,0,0,.28);
    }
    [data-theme="purple"]{ --bg-start:#1b1030; --bg-end:#2a1650; --text:#efe6ff; --muted:#cdb7ff; --accent:#8b5cf6; --accent2:#a78bfa; --card: rgba(22,10,40,.55); --chip:#21123f; --chip-border:rgba(203,171,255,.25); --list-bg: rgba(32,16,60,.35); --list-border: rgba(203,171,255,.35); --shadow: rgba(21,8,36,.35); }
    [data-theme="mint"]{ --bg-start:#052b2a; --bg-end:#0a3b3a; --text:#e6fffb; --muted:#a7f3d0; --accent:#10b981; --accent2:#34d399; --card: rgba(5,33,32,.55); --chip:#083530; --chip-border:rgba(167,243,208,.25); --list-bg: rgba(6,45,42,.35); --list-border: rgba(167,243,208,.35); --shadow: rgba(5,33,32,.3); }
    [data-theme="paper"]{ --bg-start:#f6f7fb; --bg-end:#eef1f7; --text:#0b1220; --muted:#4b5563; --accent:#2563eb; --accent2:#0891b2; --card: rgba(255,255,255,.85); --chip:#e7eaf3; --chip-border:rgba(15,23,42,.2); --list-bg:#f1f5f9; --list-border: rgba(15,23,42,.2); --shadow: rgba(15,23,42,.12); }

    *{ box-sizing: border-box }
    body{
      margin:0; min-height:100dvh;
      font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, Helvetica, Arial;
      background:
        radial-gradient(1200px 600px at 80% -10%, color-mix(in oklab, var(--accent) 35%, transparent), transparent 60%),
        radial-gradient(900px 500px at 10% 110%, color-mix(in oklab, var(--accent2) 35%, transparent), transparent 60%),
        linear-gradient(180deg, var(--bg-start), var(--bg-end));
      color:var(--text);
    }
    .wrap{ max-width:1080px; margin:0 auto; padding:24px; }
    header{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .brand{ display:flex; align-items:center; gap:10px; }
    .logo{ width:36px; height:36px; border-radius:10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 0 20px color-mix(in oklab, var(--accent) 40%, transparent); }
    h1{ font-size:18px; margin:0; letter-spacing:.3px; color:color-mix(in oklab, var(--text) 90%, white); }
    .controls{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    select, button, .toggle{
      background: color-mix(in oklab, var(--chip) 100%, transparent);
      color:var(--text); border:1px solid var(--chip-border);
      border-radius:14px; padding:9px 12px; cursor:pointer; backdrop-filter: var(--glass);
      transition:.2s ease;
    }
    button:hover, select:hover{ border-color: color-mix(in oklab, var(--chip-border) 80%, var(--accent) 20%); transform: translateY(-1px); }
    .primary{
      background: linear-gradient(135deg, color-mix(in oklab, var(--accent) 90%, white), color-mix(in oklab, var(--accent2) 90%, white));
      border:none; box-shadow: 0 8px 24px color-mix(in oklab, var(--accent) 35%, transparent);
      color: color-mix(in oklab, #06213c 90%, black); font-weight:600;
    }
    .range{ display:flex; gap:8px; align-items:center; }
    .range input[type="range"]{ width:140px; }
    .pill{ display:inline-flex; align-items:center; gap:6px; padding:8px 10px; border-radius:999px; background:color-mix(in oklab, var(--chip) 100%, transparent); border:1px solid var(--chip-border); color:color-mix(in oklab, var(--text) 85%, white); font-size:12px;}

    main{ margin-top:18px; display:grid; grid-template-columns: 1.2fr .8fr; gap:16px; }
    .card{ background: var(--card); border:1px solid color-mix(in oklab, var(--chip-border) 90%, var(--accent) 10%); border-radius:18px; padding:20px; backdrop-filter: var(--glass); box-shadow: 0 10px 40px var(--shadow); }
    .big{ font-size:96px; text-align:center; margin:8px 0 0; line-height:1.1; text-shadow: 0 8px 30px color-mix(in oklab, var(--accent) 25%, transparent); }
    .hint{ text-align:center; color:var(--muted); min-height:18px; margin:4px 0 10px; }
    .row{ display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; }
    input[type="text"]{
      width:320px; font-size:20px; padding:12px 14px; border-radius:14px;
      border:1px solid var(--chip-border); background:color-mix(in oklab, white 0%, var(--chip) 100%); color:var(--text); outline:none;
      box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--accent) 20%, transparent);
    }
    .result{ text-align:center; margin-top:8px; min-height:28px; }
    .ok{ color:var(--ok);} .bad{ color:var(--bad);} .warn{ color:var(--warn);}
    .list{ display:grid; grid-template-columns: repeat(10,minmax(0,1fr)); gap:8px; margin-top:10px; }
    .item{ text-align:center; padding:6px 6px 10px; border-radius:10px; border:1px dashed var(--list-border); color:color-mix(in oklab, var(--text) 85%, white); background: var(--list-bg); display:flex; flex-direction:column; align-items:center; gap:6px;}
    .mini-bar{ width:100%; height:6px; background:color-mix(in oklab, var(--chip) 100%, white 0%); border:1px solid var(--chip-border); border-radius:999px; overflow:hidden;}
    .mini-bar>i{ display:block; height:100%; width:0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .25s ease; }
    .bar{ height:10px; background:color-mix(in oklab, var(--chip) 100%, white 0%); border:1px solid var(--chip-border); border-radius:999px; overflow:hidden; margin-top:10px;}
    .bar>i{ display:block; height:100%; width:0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); box-shadow: 0 0 20px color-mix(in oklab, var(--accent) 55%, transparent) inset; transition: width .35s ease; }
    .tiny{ font-size:12px; color:var(--muted); }
    footer{ margin-top:14px; text-align:center; color:var(--muted); }
    .kbd{ font-family: ui-monospace, Menlo, Consolas, monospace; background:color-mix(in oklab, var(--chip) 100%, white 0%); border:1px solid var(--chip-border); padding:2px 6px; border-radius:6px;}
    @media (max-width: 980px){ main{ grid-template-columns: 1fr; } .big{ font-size:72px; } .list{ grid-template-columns: repeat(8,minmax(0,1fr)); } }

    /* Hover 提示框（跟主題色） */
    .tip{
      position:fixed; top:0; left:0; pointer-events:none; z-index:9999;
      background: color-mix(in oklab, var(--chip) 85%, var(--accent) 15%);
      border:1px solid var(--chip-border); color:var(--text);
      padding:6px 10px; border-radius:10px; font-size:12px; white-space:nowrap;
      box-shadow: 0 8px 24px var(--shadow);
      opacity:0; transform: translate(-50%, -130%); transition: opacity .12s ease;
    }
    .tip.show{ opacity:1; }

    /* 配對模式 */
    .match-wrap{ margin-top:12px; display:none; }
    .match-grid{ display:grid; grid-template-columns: repeat(6,minmax(0,1fr)); gap:8px; margin:8px 0; }
    .btn{
      background: color-mix(in oklab, var(--chip) 100%, transparent);
      border:1px solid var(--chip-border); color:var(--text);
      padding:10px; border-radius:10px; text-align:center; cursor:pointer;
      user-select:none;
    }
    .btn:hover{ border-color: color-mix(in oklab, var(--accent) 30%, var(--chip-border)); }
    .btn.sel{ outline:2px solid color-mix(in oklab, var(--accent) 70%, white 10%); }
    .btn.ok{ background: color-mix(in oklab, var(--ok) 30%, var(--chip)); border-color: color-mix(in oklab, var(--ok) 50%, var(--chip-border)); color:#08210e; }
    .btn.bad{ animation: shake .3s ease; border-color: var(--bad); }
    @keyframes shake{ 0%,100%{ transform:translateX(0);} 25%{ transform:translateX(-6px);} 75%{ transform:translateX(6px);} }

    /* ===== Modal（過關 / 每日）===== */
    .modal{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:9998; }
    .modal.show{ display:flex; }
    .backdrop{ position:absolute; inset:0; background:rgba(0,0,0,.45); backdrop-filter: blur(4px); animation: fadeIn .25s ease; }
    .card-modal{
      position:relative; width:min(560px, 92vw); background: color-mix(in oklab, var(--card) 85%, white 0%);
      border:1px solid var(--chip-border); border-radius:16px; padding:20px; box-shadow: 0 20px 70px var(--shadow);
      transform: scale(.94); animation: popIn .22s ease forwards;
    }
    .card-modal h3{ margin:0 0 8px 0; }
    .modal-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:12px; flex-wrap:wrap; }
    @keyframes popIn{ from{ transform: scale(.94); opacity:0 } to{ transform: scale(1); opacity:1 } }
    @keyframes fadeIn{ from{ opacity:0 } to{ opacity:1 } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>韓文 40 音 — 關卡訓練＋配對模式</h1>
          <div class="tiny">快捷鍵：<span class="kbd">Enter</span> 檢查、<span class="kbd">Space</span> 播音、<span class="kbd">→</span> 下一題；配對：<span class="kbd">1..6</span> 與 <span class="kbd">Q..Y</span></div>
        </div>
      </div>
      <div class="controls">
        <!-- 主題 -->
        <select id="theme" title="主題">
          <option value="blue">藍色</option><option value="purple">紫霧</option><option value="mint">薄荷</option><option value="paper">紙感</option>
        </select>

        <!-- 模式（已移除「聽音拼寫」） -->
        <select id="mode" title="模式">
          <option value="learn">教學模式</option>
          <option value="type">打字練習</option>
          <option value="match">配對模式</option>
        </select>

        <!-- 自由範圍 -->
        <select id="scope" title="自由範圍">
          <option value="vowels">母音（21）</option>
          <option value="consonants">子音（19）</option>
          <option value="cv">組合（CV 基礎）</option>
        </select>

        <!-- 關卡選擇 -->
        <select id="section" title="選擇關卡"></select>

        <!-- 混合比例（關卡：當前關卡占比%） -->
        <div class="range">
          <span class="pill">本關占比 <b id="mixVal">20%</b></span>
          <input id="mix" type="range" min="0" max="100" step="5" value="20" title="當前關卡占比(%)">
        </div>

        <!-- 只保留一個 toggle，清楚標示：羅馬拼音 -->
        <label class="toggle" title="顯示羅馬拼音">
          <span class="tiny" style="margin-right:6px;">羅馬拼音</span>
          <input id="hintToggle" type="checkbox" checked />
          <div class="track" style="width:44px;height:24px;border-radius:999px;background:var(--chip);border:1px solid var(--chip-border);padding:3px;display:flex;align-items:center;"><div class="dot" style="width:18px;height:18px;border-radius:50%;background:color-mix(in oklab, var(--accent) 70%, white 30%);transition:.2s;"></div></div>
        </label>

        <button id="shuffle">🔀 洗牌</button>
        <button id="reset">♻️ 重置成績</button>
        <button id="resetProgress">🧹 重置熟練度</button>
        <button id="map" class="primary">🗺️ 關卡地圖</button>
        <button id="challenge" class="primary">⏱️ 30 秒挑戰</button>
      </div>
    </header>

    <main>
      <section class="card">
        <div class="row" style="justify-content:space-between">
          <div class="stats" style="gap:8px; flex-wrap:wrap;">
            <span class="pill">正確率 <b id="acc">100%</b></span>
            <span class="pill">平均反應 <b id="avg">—</b> s</span>
            <span class="pill">Combo <b id="combo">0</b></span>
            <span class="pill">最佳連擊 <b id="best">0</b></span>
            <span class="pill" id="secInfo" title="當前關卡">關卡：自由練習</span>
          </div>
          <div class="row">
            <button id="speak">🔊 發音</button>
            <button id="slower">🐢 慢速</button>
            <button id="next">➡️ 下一個</button>
          </div>
        </div>

        <div id="char" class="big">ㅏ</div>
        <div id="hint" class="hint">a</div>

        <!-- 打字區（學習/配對模式會隱藏） -->
        <div id="answerRow" class="row" style="margin-top:10px;">
          <input id="answer" type="text" placeholder="輸入羅馬音… (例如 a, eo, ga)" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="latin" />
          <button id="check" class="primary">✅ 檢查</button>
        </div>

        <!-- 配對模式 UI -->
        <div id="matchWrap" class="match-wrap">
          <div class="tiny">🔗 配對：點選一個韓文字（<span class="kbd">1..6</span>）再點羅馬音（<span class="kbd">Q..Y</span>）。全配對成功後自動下一回合。</div>
          <div class="match-grid" id="gridChars"></div>
          <div class="match-grid" id="gridRoma"></div>
        </div>

        <div id="result" class="result"></div>

        <!-- 本題倒數條（打字模式用） -->
        <div class="bar" title="本題倒數"><i id="timerBar"></i></div>

        <!-- 總熟練度視覺條 -->
        <div class="bar" title="熟練度總覽"><i id="prog"></i></div>
        <div class="tiny" style="margin-top:8px;">提示：<span class="kbd">Enter</span> 檢查、<span class="kbd">Space</span> 播音、<span class="kbd">→</span> 下一題</div>
      </section>

      <aside class="card">
        <div class="row" style="justify-content:space-between">
          <b>本輪清單（依關卡或範圍）</b>
          <span class="tiny">滑過可看羅馬音；每字答對 +1%（封頂 100%）</span>
        </div>
        <div id="list" class="list"></div>
      </aside>
    </main>

    <footer>© 2026 Hangul Trainer — Easy Unlock / Match Mode</footer>
  </div>

  <!-- Hover 提示 -->
  <div id="tip" class="tip" role="tooltip" aria-hidden="true"></div>

  <!-- Modal：過關 -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="backdrop"></div>
    <div class="card-modal">
      <h3 id="modalTitle">恭喜！</h3>
      <div id="modalBody" class="tiny">完成！</div>
      <div class="modal-actions">
        <button id="modalClose">關閉</button>
        <button id="modalNext" class="primary">去下一關</button>
        <button id="modalMap">看地圖</button>
      </div>
    </div>
  </div>

  <script>
    /* ========= 常數（可自訂） ========= */
    const UNLOCK_TOTAL_POINTS = 20;  // ✅ 當前關卡 4 字「累計總進度」達到 20 點即解鎖下一關
    const SOFT_LIMIT = 2.8;          // 本題軟時限（秒）

    /* ========= 字表與羅馬音 ========= */
    const consonants = [
      {h:'ㄱ', r:'g'}, {h:'ㄲ', r:'kk'}, {h:'ㄴ', r:'n'}, {h:'ㄷ', r:'d'}, {h:'ㄸ', r:'tt'},
      {h:'ㄹ', r:'r'}, {h:'ㅁ', r:'m'}, {h:'ㅂ', r:'b'}, {h:'ㅃ', r:'pp'}, {h:'ㅅ', r:'s'},
      {h:'ㅆ', r:'ss'}, {h:'ㅇ', r:'ng'}, {h:'ㅈ', r:'j'}, {h:'ㅉ', r:'jj'}, {h:'ㅊ', r:'ch'},
      {h:'ㅋ', r:'k'}, {h:'ㅌ', r:'t'}, {h:'ㅍ', r:'p'}, {h:'ㅎ', r:'h'}
    ];
    const vowels = [
      {h:'ㅏ', r:'a'}, {h:'ㅑ', r:'ya'}, {h:'ㅓ', r:'eo'}, {h:'ㅕ', r:'yeo'}, {h:'ㅗ', r:'o'},
      {h:'ㅛ', r:'yo'}, {h:'ㅜ', r:'u'}, {h:'ㅠ', r:'yu'}, {h:'ㅡ', r:'eu'}, {h:'ㅣ', r:'i'},
      {h:'ㅐ', r:'ae'}, {h:'ㅒ', r:'yae'}, {h:'ㅔ', r:'e'}, {h:'ㅖ', r:'ye'}, {h:'ㅘ', r:'wa'},
      {h:'ㅙ', r:'wae'}, {h:'ㅚ', r:'oe'}, {h:'ㅝ', r:'wo'}, {h:'ㅞ', r:'we'}, {h:'ㅟ', r:'wi'},
      {h:'ㅢ', r:'ui'}
    ];
    const V_POOL = vowels.map(v=>({h:v.h,r:v.r,type:'v'}));
    const C_POOL = consonants.map(c=>({h:c.h,r:c.r,type:'c'}));
    const ROMAP = Object.fromEntries([...V_POOL, ...C_POOL].map(x=>[x.h,x.r]));

    /* ========= 10 個關卡 ========= */
    const sections = {
      s1: ['ㅏ','ㄱ','ㅣ','ㄴ'],
      s2: ['ㅑ','ㄷ','ㅡ','ㄹ'],
      s3: ['ㅓ','ㅁ','ㅔ','ㅂ'],
      s4: ['ㅕ','ㅅ','ㅐ','ㅇ'],
      s5: ['ㅗ','ㅈ','ㅛ','ㅊ'],
      s6: ['ㅜ','ㅋ','ㅠ','ㅎ'],
      s7: ['ㅚ','ㄲ','ㅘ','ㅌ'],
      s8: ['ㅝ','ㅞ','ㅟ','ㅍ'],
      s9: ['ㅖ','ㅒ','ㅙ','ㅃ'],
      s10:['ㅢ','ㅆ','ㅉ','ㄸ'],
    };

    /* ========= 便捷選取 ========= */
    const $ = s => document.querySelector(s);
    const charEl=$('#char'), hintEl=$('#hint'), ansRow=$('#answerRow'), ansEl=$('#answer'), resEl=$('#result');
    const accEl=$('#acc'), avgEl=$('#avg'), comboEl=$('#combo'), bestEl=$('#best'), progEl=$('#prog');
    const listEl=$('#list'), themeSel=$('#theme'), secSel=$('#section'), secInfo=$('#secInfo'), tipEl=$('#tip');
    const matchWrap=$('#matchWrap'), gridChars=$('#gridChars'), gridRoma=$('#gridRoma');
    const mixEl=$('#mix'), mixValEl=$('#mixVal');
    const timerBarEl=$('#timerBar');
    const btnChallenge = $('#challenge');

    const modalEl=$('#modal'), modalTitle=$('#modalTitle'), modalBody=$('#modalBody');
    const modalClose=$('#modalClose'), modalNext=$('#modalNext'), modalMap=$('#modalMap');

    /* ========= 狀態／保存 ========= */
    let mode='learn', scope='vowels', showHint=true;
    let base=[], pool=[], hard=[];
    let current=null, startTime=null;
    let stats = JSON.parse(localStorage.getItem('hangul-blue-stats')||'null') || {ok:0,total:0,t:[],combo:0,best:0};
    let progress = JSON.parse(localStorage.getItem('hangul-progress-v1')||'null') || {};
    let unlocked = JSON.parse(localStorage.getItem('hangul-section-unlock-v1')||'null') || initUnlock();
    let currentSection = null;

    // 錯題加權
    let errors = JSON.parse(localStorage.getItem('hangul-errors-v1')||'null') || {};
    const saveErrors = ()=> localStorage.setItem('hangul-errors-v1', JSON.stringify(errors));

    // 清單進度元素映射（先宣告避免 TDZ）
    let progressEls = new Map();

    // 主題
    const savedTheme = localStorage.getItem('hangul-theme') || 'blue';
    applyTheme(savedTheme); if(themeSel) themeSel.value=savedTheme;

    // 混合比例（當前關卡占比%）
    let MIX_CURR = parseInt(localStorage.getItem('hangul-mix')||'20',10);
    if (isNaN(MIX_CURR)) MIX_CURR = 20;
    if (mixEl) { mixEl.value = MIX_CURR; }
    if (mixValEl) { mixValEl.textContent = MIX_CURR + '%'; }

    // 本題倒數（軟時限）
    let timerId=null;

    // 配對模式鍵盤支持
    let matchCharBtns=[], matchRomaBtns=[];

    // 30 秒挑戰（可開可關）
    let challenge = { on:false, remain:0, timer:null, score:0 };

    /* ========= 綁定 ========= */
    if (themeSel) themeSel.addEventListener('change', e=> applyTheme(e.target.value));
    const modeSel = $('#mode'); if (modeSel) modeSel.addEventListener('change', e=>{ mode=e.target.value; syncMode(); });
    const scopeSel = $('#scope'); if (scopeSel) scopeSel.addEventListener('change', e=>{ setFreeScope(e.target.value); if(mode==='match') startMatchRound(); });
    const hintT = $('#hintToggle'); if (hintT) hintT.addEventListener('change', e=>{ showHint=e.target.checked; if(hintEl) hintEl.style.visibility= showHint?'visible':'hidden'; });
    const btnShuffle = $('#shuffle'); if (btnShuffle) btnShuffle.addEventListener('click', ()=>{ pool=shuffle([...base]); hard=[]; renderList(); mode==='match'?startMatchRound():next(); });
    const btnReset = $('#reset'); if (btnReset) btnReset.addEventListener('click', ()=>{ stats={ok:0,total:0,t:[],combo:0,best:0}; saveStats(); updateStats(); if(progEl) progEl.style.width='0%'; toast('成績已重置','warn'); });
    const btnResetP = $('#resetProgress'); if (btnResetP) btnResetP.addEventListener('click', ()=>{ if(confirm('確定清空所有熟練度進度？')){ progress={}; saveProgress(); renderList(); toast('熟練度已清空','warn'); }});
    const btnMap = $('#map'); if (btnMap) btnMap.addEventListener('click', ()=> location.href='sections.html');
    const btnSpeak = $('#speak'); if (btnSpeak) btnSpeak.addEventListener('click', ()=> speak(getSpeakText(current),1));
    const btnSlow = $('#slower'); if (btnSlow) btnSlow.addEventListener('click', ()=> speak(getSpeakText(current),0.85));
    const btnNext = $('#next'); if (btnNext) btnNext.addEventListener('click', ()=> mode==='match'?startMatchRound():next());
    const btnCheck = $('#check'); if (btnCheck) btnCheck.addEventListener('click', check);
    if (btnChallenge) btnChallenge.addEventListener('click', toggleChallenge);

    // 關卡選擇
    function buildSectionSelect(){
      if(!secSel) return;
      secSel.innerHTML = '';
      const opt0 = document.createElement('option');
      opt0.value=''; opt0.textContent='（選擇關卡訓練）';
      secSel.appendChild(opt0);
      for(const key of Object.keys(sections)){
        const o = document.createElement('option');
        const idx = key.replace('s','');
        o.value = key;
        const locked = !unlocked[key];
        o.disabled = locked;
        o.textContent = locked ? `🔒 S${idx}` : `S${idx}`;
        secSel.appendChild(o);
      }
      secSel.addEventListener('change', e=>{
        const val=e.target.value;
        if(!val){ setFreeScope(scope); mode==='match'?startMatchRound():next(); return; }
        if(!unlocked[val]){ alert('尚未解鎖此關卡'); e.target.value=''; return; }
        setSection(val);
        mode==='match'?startMatchRound():next();
      });
    }

    if (ansEl) ansEl.addEventListener('keydown', (e) => { if (e.key==='Enter' && !e.isComposing){ e.preventDefault(); check(); }});
    window.addEventListener('keydown', (e)=>{
      if (e.isComposing) return;
      const tag=(e.target?.tagName||'').toLowerCase();
      const inInput = tag==='input'||tag==='textarea'||e.target?.isContentEditable;
      const key=e.key, code=e.code;

      // 配對模式：數字 1..6 選上排、QWERTY 選下排
      if (mode==='match'){
        const i = '123456'.indexOf(key.toLowerCase());
        const j = 'qwerty'.indexOf(key.toLowerCase());
        if(i>=0 && matchCharBtns[i]) onPickChar(matchCharBtns[i]);
        if(j>=0 && matchRomaBtns[j]) onPickRoma(matchRomaBtns[j]);
        return;
      }

      const isSpace = key===' '||key==='Space'||key==='Spacebar'||code==='Space';
      if(isSpace && !inInput){ e.preventDefault(); if(current) speak(getSpeakText(current),1); }
      if(key==='Enter' && !inInput){ if(mode!=='learn'){ e.preventDefault(); check(); } }
      if(key==='ArrowRight' && !inInput){ e.preventDefault(); mode==='match'?startMatchRound():next(); }
    }, {capture:true, passive:false});

    /* ========= Hover 提示（全域） ========= */
    function showTip(text){
      if(!text) return;
      tipEl.textContent = text;
      tipEl.classList.add('show');
      tipEl.setAttribute('aria-hidden','false');
    }
    function hideTip(){
      tipEl.classList.remove('show');
      tipEl.setAttribute('aria-hidden','true');
    }
    window.addEventListener('mousemove', (e)=>{
      const pad=12; let x=e.clientX, y=e.clientY;
      const rect=tipEl.getBoundingClientRect(); const vw=innerWidth;
      if (x + rect.width/2 + pad > vw) x = vw - rect.width/2 - pad;
      if (x - rect.width/2 - pad < 0) x = rect.width/2 + pad;
      tipEl.style.transform = `translate(${x}px, ${y-14}px)`;
    });
    if(charEl){
      charEl.addEventListener('mouseenter', ()=> showTip(current?.r || ''));
      charEl.addEventListener('mouseleave', hideTip);
      charEl.addEventListener('touchstart', ()=>{ showTip(current?.r||''); setTimeout(hideTip,1200); }, {passive:true});
    }
    if(listEl){
      listEl.addEventListener('mouseover', (e)=>{
        const box=e.target.closest('.item'); if(!box) return;
        const roman=box.dataset.roman; if(roman) showTip(roman);
      });
      listEl.addEventListener('mouseout', (e)=>{
        const to=e.relatedTarget; if(!to || !listEl.contains(to)) hideTip();
      });
      listEl.addEventListener('touchstart', (e)=>{
        const box=e.target.closest('.item'); if(!box) return;
        const roman=box.dataset.roman; if(!roman) return;
        showTip(roman); setTimeout(hideTip,1200);
      }, {passive:true});
    }

    /* ========= 主題 ========= */
    function applyTheme(name){
      const theme = ['blue','purple','mint','paper'].includes(name)?name:'blue';
      document.body.setAttribute('data-theme', theme==='blue'?'':theme);
      localStorage.setItem('hangul-theme', theme);
    }

    /* ========= 範圍／關卡 ========= */
    function setFreeScope(val){
      currentSection = null;
      if (secInfo) secInfo.textContent = '關卡：自由練習';
      if (secSel) secSel.value = '';
      scope = val;
      if(scope==='vowels'){ base=[...V_POOL]; }
      else if(scope==='consonants'){ base=[...C_POOL]; }
      else { // cv：子音 × 核心母音
        const coreVowels = ['ㅏ','ㅓ','ㅗ','ㅜ','ㅡ','ㅣ'];
        const cMap = Object.fromEntries(consonants.map(x=>[x.h,x.r]));
        const vMap = Object.fromEntries(vowels.map(x=>[x.h,x.r]));
        function combineCV(c, v) {
          const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
          const JUNG= ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
          const SBase=0xAC00,LCount=19,VCount=21,TCount=28,NCount=VCount*TCount;
          const LIndex=CHO.indexOf(c), VIndex=JUNG.indexOf(v); if(LIndex<0||VIndex<0) return c+v;
          return String.fromCharCode(SBase + (LIndex*NCount) + (VIndex*TCount));
        }
        function romanizeCV(c, v){ return (cMap[c]||'') + (vMap[v]||''); }
        base = [];
        consonants.forEach(c=> coreVowels.forEach(v=> base.push({h:combineCV(c.h,v), r:romanizeCV(c.h,v), type:'cv'})));
      }
      pool=[...base]; hard=[]; renderList();
    }

    function setSection(key){
      currentSection = key;
      const chars = sections[key];
      base = chars.map(h => ({h, r: ROMAP[h]}));
      pool=[...base]; hard=[];
      if (secInfo) secInfo.textContent = `關卡：S${key.replace('s','')}`;
      renderList();
    }

    /* ========= 模式 ========= */
    function syncMode(){
      hideTip();

      // 停止上一題倒數
      if (timerId) { clearInterval(timerId); timerId=null; if(timerBarEl) timerBarEl.style.width='0%'; }

      if(mode==='match'){
        if(ansRow){ ansRow.style.display='none'; if(ansEl){ ansEl.disabled=true; ansEl.value=''; } }
        if(hintEl) hintEl.style.visibility = 'hidden';
        if(matchWrap) matchWrap.style.display='block';
        startMatchRound(); // 立即載入配對盤面
        return;
      }else{
        if(matchWrap) matchWrap.style.display='none';
      }

      if(mode==='learn'){
        if(ansRow) ansRow.style.display='none';
        if(ansEl){ ansEl.disabled=true; ansEl.value=''; }
        if(hintEl) hintEl.style.visibility='visible';
      }else{ // type
        if(ansRow) ansRow.style.display='flex';
        if(ansEl){ ansEl.disabled=false; setTimeout(()=> { ansEl.focus(); ansEl.select(); }, 0); }
        if(hintEl) hintEl.style.visibility='hidden';
        next();
      }
    }

    /* ========= 清單（含每字熟練條 + hover 資料） ========= */
    function renderList(){
      if(!listEl) return;
      listEl.innerHTML=''; progressEls.clear();
      base.forEach(x=>{
        const b = progress[x.h]||0;
        const box = document.createElement('div'); box.className='item';
        box.dataset.roman = x.r; // hover 用（清單顯示）
        const ch = document.createElement('div'); ch.textContent=x.h; ch.style.fontSize='28px';
        const bar = document.createElement('div'); bar.className='mini-bar';
        const fill = document.createElement('i'); fill.style.width = Math.min(100,b)+'%';
        bar.appendChild(fill); box.appendChild(ch); box.appendChild(bar);
        listEl.appendChild(box);
        progressEls.set(x.h, fill);
      });
    }

    /* ========= 抽題（含錯題加權 & 關卡混合） ========= */
    function weightBagByErrors(items){
      const bag=[];
      items.forEach(x=>{
        const h = x.h || x;
        const w = Math.max(1, Math.min(4, Math.round((errors[h]||0)) + 1)); // 1~4 倍
        for(let i=0;i<w;i++) bag.push(x);
      });
      return bag;
    }
    function getPrevChars(){
      const prevChars=[];
      if(!currentSection) return prevChars;
      const currIndex=parseInt(currentSection.replace('s',''),10);
      for(let i=1;i<currIndex;i++){
        sections['s'+i].forEach(h=> prevChars.push({h, r: ROMAP[h]}));
      }
      return prevChars;
    }
    function pick(){
      if(!currentSection){
        const bag = weightBagByErrors([...pool, ...hard, ...hard]);
        return bag[Math.floor(Math.random()*bag.length)];
      }
      const prev = getPrevChars();
      const useCurrent = (prev.length===0) ? true : (Math.random() < (MIX_CURR/100));
      if(useCurrent){
        const bag = weightBagByErrors(pool);
        return bag[Math.floor(Math.random()*bag.length)];
      }else{
        const bag = weightBagByErrors(prev);
        return bag[Math.floor(Math.random()*bag.length)];
      }
    }

    /* ========= 出題 / 判分 ========= */
    function next(){
      current = pick(); if(!current) return;
      if (charEl) charEl.textContent=current.h;
      if (hintEl) hintEl.textContent= showHint ? current.r : '';
      if (resEl) resEl.textContent='';
      if (ansEl) { ansEl.value=''; if(!ansEl.disabled){ ansEl.focus(); ansEl.select(); } }
      startTime=performance.now();

      // 反應倒數：只在打字模式
      if (timerId) { clearInterval(timerId); timerId=null; }
      if (mode==='type'){
        const t0 = performance.now();
        timerId = setInterval(()=>{
          const t = (performance.now()-t0)/1000;
          const p = Math.max(0, Math.min(100, 100*(1 - t/SOFT_LIMIT)));
          if (timerBarEl) timerBarEl.style.width = p + '%';
          if (t >= SOFT_LIMIT){
            clearInterval(timerId); timerId=null;
            if (resEl) resEl.innerHTML = `<span class="bad">⌛ 超時 → 正解：${current.r}</span>`;
            hard.push(current);
            errors[current.h] = (errors[current.h]||0) + 1; saveErrors();
            stats.combo = 0; saveStats(); updateStats();
            setTimeout(next, 500);
          }
        }, 60);
      }else{
        if (timerBarEl) timerBarEl.style.width='0%';
      }
    }
    function getSpeakText(item){ return item?.h||''; }
    function speak(){ /* 已移除強制發音，只保留按鈕／Space 觸發；你唔要聽音模式 */ }

    function check(){
      if(!current || !ansEl || mode!=='type') return;
      const resp=ansEl.value.trim().toLowerCase();
      const correct=current.r;
      const dt=(performance.now()-startTime)/1000;
      stats.total++; stats.t.push(dt);

      if(resp===correct){
        stats.ok++; stats.combo++; stats.best=Math.max(stats.best, stats.combo);
        if (resEl) resEl.innerHTML=`<span class="ok">✅ 正確！${correct}</span> <span class="tiny">用時 ${dt.toFixed(2)}s</span>`;
        bumpProgress();

        const key=current.h;
        const nv=Math.min(100,(progress[key]||0)+1); progress[key]=nv; saveProgress();
        const el=progressEls.get(key); if(el) el.style.width=nv+'%';

        // 錯題淡出
        errors[key] = Math.max(0, (errors[key]||0) - 0.5); saveErrors();

        maybeUnlockNext();
        setTimeout(next, 420);
      }else{
        stats.combo=0;
        if (resEl) resEl.innerHTML=`<span class="bad">❌ ${resp||'（空白）'} → 正解：${correct}</span>`;
        hard.push(current);
        errors[current.h] = (errors[current.h]||0) + 1; saveErrors();

        setTimeout(next, 650);
      }
      saveStats(); updateStats();
    }

    /* ========= 配對模式 ========= */
    let matchState = { selChar:null, selRoma:null, pairs:[], done:0 };
    function startMatchRound(){
      if(!matchWrap) return;
      // 根據當前 base 立即重載（切換母音/子音/混合/關卡後即時更新）
      const source = (currentSection ? base : base.length? base : V_POOL);
      const N = Math.min(6, Math.max(4, source.length>=6?6:source.length));
      const set = shuffle([...source]).slice(0, N);

      matchState = { selChar:null, selRoma:null, pairs:set.map(x=>({h:x.h, r:x.r})), done:0 };

      gridChars.innerHTML=''; gridRoma.innerHTML='';

      // 上排：韓文字母（❗不設 hover，避免劇透）
      set.forEach(p=>{
        const b=document.createElement('div'); b.className='btn'; b.textContent=p.h; b.dataset.h=p.h; b.dataset.r=p.r;
        b.onclick=()=> onPickChar(b);
        gridChars.appendChild(b);
      });
      // 下排：羅馬音（保留 hover）
      shuffle([...set]).forEach(p=>{
        const b=document.createElement('div'); b.className='btn'; b.textContent=p.r; b.dataset.h=p.h; b.dataset.r=p.r;
        b.addEventListener('mouseenter', ()=> showTip(p.r));
        b.addEventListener('mouseleave', hideTip);
        b.onclick=()=> onPickRoma(b);
        gridRoma.appendChild(b);
      });

      matchCharBtns = Array.from(gridChars.querySelectorAll('.btn'));
      matchRomaBtns = Array.from(gridRoma.querySelectorAll('.btn'));

      // 關閉倒數
      if (timerId) { clearInterval(timerId); timerId=null; }
      if (timerBarEl) timerBarEl.style.width='0%';
      if (resEl) resEl.textContent='';
    }
    function onPickChar(btn){
      if(btn.classList.contains('ok')) return;
      gridChars.querySelectorAll('.btn').forEach(x=>x.classList.remove('sel'));
      btn.classList.add('sel');
      matchState.selChar = btn;
      tryMatch();
    }
    function onPickRoma(btn){
      if(btn.classList.contains('ok')) return;
      gridRoma.querySelectorAll('.btn').forEach(x=>x.classList.remove('sel'));
      btn.classList.add('sel');
      matchState.selRoma = btn;
      tryMatch();
    }
    function tryMatch(){
      const a=matchState.selChar, b=matchState.selRoma;
      if(!a || !b) return;
      const ok = (a.dataset.h === b.dataset.h);
      if(ok){
        a.classList.remove('sel'); b.classList.remove('sel');
        a.classList.add('ok'); b.classList.add('ok');
        matchState.done++;

        // 進度 +1%
        const key=a.dataset.h; const nv=Math.min(100,(progress[key]||0)+1);
        progress[key]=nv; saveProgress();
        const el=progressEls.get(key); if(el) el.style.width=nv+'%';

        if(matchState.done === matchState.pairs.length){
          toast('本回合完成！已為配對字各 +1%','ok');
          // 視作連擊增加（只影響體感，不作解鎖條件）
          stats.ok += matchState.pairs.length; stats.total += matchState.pairs.length;
          stats.combo += matchState.pairs.length; stats.best = Math.max(stats.best, stats.combo);
          saveStats(); updateStats(); bumpProgress();
          maybeUnlockNext();
          setTimeout(startMatchRound, 500);
        }
      }else{
        a.classList.add('bad'); b.classList.add('bad');
        setTimeout(()=>{ a.classList.remove('bad','sel'); b.classList.remove('bad','sel'); }, 220);
        errors[a.dataset.h] = (errors[a.dataset.h]||0) + 1; saveErrors();
        stats.combo=0; saveStats(); updateStats();
      }
      matchState.selChar = null; matchState.selRoma = null;
    }

    /* ========= 解鎖：當前關卡 4 字累計總進度 ≥ 20 點 ========= */
    function canUnlockSection(key){
      const chars = sections[key]; if(!chars) return false;
      const sum = chars.reduce((acc,h)=> acc + (progress[h]||0), 0);  // 4 個字的進度總和
      return sum >= UNLOCK_TOTAL_POINTS;
    }
    function nextKey(k){ const idx=parseInt(k.replace('s',''),10); return 's'+(idx+1); }
    function maybeUnlockNext(){
      if(!currentSection) return;
      const curKey=currentSection; if(!unlocked[curKey]) return;
      const nxt = nextKey(curKey); if(!sections[nxt] || unlocked[nxt]) return;
      if(canUnlockSection(curKey)){
        unlocked[nxt]=true; saveUnlock();
        showModalUnlock(curKey, nxt);
      }
    }

    /* ========= Modal ========= */
    function showModalUnlock(curKey, nextKeyStr){
      if(!modalEl) return;
      const idxCur = curKey.replace('s','');
      const idxNext = nextKeyStr.replace('s','');
      modalTitle.textContent = `🎉 S${idxCur} 完成！`;
      modalBody.innerHTML = `
        <div class="tiny">你已達到解鎖條件：本關 4 個字的「累計總進度」達 <b>${UNLOCK_TOTAL_POINTS}</b> 點。</div>
        <div class="tiny" style="margin-top:6px;">S${idxNext} 已解鎖，是否前往下一關？</div>
      `;
      modalNext.style.display = '';
      modalNext.onclick = ()=>{ setSection(nextKeyStr); hideModal(); mode==='match'?startMatchRound():next(); };
      modalEl.classList.add('show'); modalEl.setAttribute('aria-hidden','false');
    }
    function hideModal(){ modalEl.classList.remove('show'); modalEl.setAttribute('aria-hidden','true'); }
    if(modalClose) modalClose.onclick = hideModal;
    if(modalMap) modalMap.onclick = ()=>{ location.href='sections.html'; };

    /* ========= 30 秒挑戰（可開可關） ========= */
    function toggleChallenge(){
      if(challenge.on){
        clearInterval(challenge.timer); challenge.on=false;
        btnChallenge.textContent='⏱️ 30 秒挑戰';
        toast(`挑戰已停止（得分：${challenge.score}）`,'warn');
        return;
      }
      // start
      challenge.on=true; challenge.remain=30; challenge.score=0;
      btnChallenge.textContent='🛑 停止挑戰';
      toast('挑戰開始！30 秒內盡量答對！','ok');
      // 以當前模式出題
      mode==='match'?startMatchRound():next();
      challenge.timer = setInterval(()=>{
        challenge.remain--;
        btnChallenge.textContent = `⏱️ ${challenge.remain}s`;
        if(challenge.remain<=0){
          clearInterval(challenge.timer); challenge.on=false;
          btnChallenge.textContent='⏱️ 30 秒挑戰';
          toast(`時間到！得分 ${challenge.score}`,'ok');
        }
      }, 1000);
    }

    /* ========= 統計／存取 ========= */
    function bumpProgress(){ if(!progEl) return; const p=Math.min(100,(stats.ok/Math.max(1,stats.total))*100); progEl.style.width=p+'%'; }
    function updateStats(){
      if(!accEl||!avgEl||!comboEl||!bestEl) return;
      const acc = stats.total? Math.round(stats.ok/stats.total*100):100;
      accEl.textContent=acc+'%';
      const avg=stats.t.length? (stats.t.reduce((a,b)=>a+b,0)/stats.length):0;
      avgEl.textContent=isFinite(avg)&&avg? avg.toFixed(2):'—';
      comboEl.textContent=stats.combo; bestEl.textContent=stats.best;
    }
    function saveStats(){ localStorage.setItem('hangul-blue-stats', JSON.stringify(stats)); }
    function saveProgress(){ localStorage.setItem('hangul-progress-v1', JSON.stringify(progress)); }
    function initUnlock(){ const obj={}; Object.keys(sections).forEach(k=>obj[k]=false); obj.s1=true; localStorage.setItem('hangul-section-unlock-v1', JSON.stringify(obj)); return obj; }
    function saveUnlock(){ localStorage.setItem('hangul-section-unlock-v1', JSON.stringify(unlocked)); }
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } return a }

    function toast(msg,type='ok'){ if(!resEl) return; resEl.innerHTML=`<span class="${type==='ok'?'ok':type==='warn'?'warn':'bad'}">◦ ${msg}</span>`; }

    /* ========= 初始化 ========= */
    function initFromURL(){
      buildSectionSelect();
      const urlSec = new URLSearchParams(location.search).get('section');
      if (urlSec && sections[urlSec]) { setSection(urlSec); } else { setFreeScope('vowels'); }
    }

    window.addEventListener('DOMContentLoaded', () => {
      initFromURL();
      syncMode();            // 根據當前 mode 出題 / 顯示配對
      renderList();
      if(mode!=='match') next();
    });
  </script>
</body>
</html>
