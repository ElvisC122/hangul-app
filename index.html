<!doctype html>
<html lang=" 關卡訓練</title><html lang="ko">
  <meta name="description" content="Hangul trainer with sections, unlock, themes, per-letter progress, TTS and keyboard shortcuts.">
  <style>
    /* 主題（與先前版本一致） */
    :root{
      --bg-start:#071a2a; --bg-end:#0b2c4a;
      --card: rgba(17,24,39,.55);
      --glass: blur(10px);
      --text:#e6f2ff; --muted:#9cc0dd;
      --accent:#3b82f6; --accent2:#06b6d4;
      --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b;
      --chip:#0b2540; --chip-border:rgba(148,163,184,.25);
      --list-bg: rgba(2,6,23,.35); --list-border: rgba(148,163,184,.3);
      --shadow: rgba(0,0,0,.28);
    }
    [data-theme="purple"]{ --bg-start:#1b1030; --bg-end:#2a1650; --text:#efe6ff; --muted:#cdb7ff; --accent:#8b5cf6; --accent2:#a78bfa; --card: rgba(22,10,40,.55); --chip:#21123f; --chip-border:rgba(203,171,255,.25); --list-bg: rgba(32,16,60,.35); --list-border: rgba(203,171,255,.35); --shadow: rgba(21,8,36,.35); }
    [data-theme="mint"]{ --bg-start:#052b2a; --bg-end:#0a3b3a; --text:#e6fffb; --muted:#a7f3d0; --accent:#10b981; --accent2:#34d399; --card: rgba(5,33,32,.55); --chip:#083530; --chip-border:rgba(167,243,208,.25); --list-bg: rgba(6,45,42,.35); --list-border: rgba(167,243,208,.35); --shadow: rgba(5,33,32,.3); }
    [data-theme="paper"]{ --bg-start:#f6f7fb; --bg-end:#eef1f7; --text:#0b1220; --muted:#4b5563; --accent:#2563eb; --accent2:#0891b2; --card: rgba(255,255,255,.85); --chip:#e7eaf3; --chip-border:rgba(15,23,42,.2); --list-bg:#f1f5f9; --list-border: rgba(15,23,42,.2); --shadow: rgba(15,23,42,.12); }

    *{ box-sizing: border-box }
    body{
      margin:0; min-height:100dvh;
      font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, Helvetica, Arial;
      background:
        radial-gradient(1200px 600px at 80% -10%, color-mix(in oklab, var(--accent) 35%, transparent), transparent 60%),
        radial-gradient(900px 500px at 10% 110%, color-mix(in oklab, var(--accent2) 35%, transparent), transparent 60%),
        linear-gradient(180deg, var(--bg-start), var(--bg-end));
      color:var(--text);
    }
    .wrap{ max-width:1080px; margin:0 auto; padding:24px; }
    header{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .brand{ display:flex; align-items:center; gap:10px; }
    .logo{ width:36px; height:36px; border-radius:10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 0 20px color-mix(in oklab, var(--accent) 40%, transparent); }
    h1{ font-size:18px; margin:0; letter-spacing:.3px; color:color-mix(in oklab, var(--text) 90%, white); }
    .controls{ display:flex; gap:8px; flex-wrap:wrap; }
    select, button, .toggle{
      background: color-mix(in oklab, var(--chip) 100%, transparent);
      color:var(--text); border:1px solid var(--chip-border);
      border-radius:14px; padding:9px 12px; cursor:pointer; backdrop-filter: var(--glass);
      transition:.2s ease;
    }
    button:hover, select:hover{ border-color: color-mix(in oklab, var(--chip-border) 80%, var(--accent) 20%); transform: translateY(-1px); }
    .primary{
      background: linear-gradient(135deg, color-mix(in oklab, var(--accent) 90%, white), color-mix(in oklab, var(--accent2) 90%, white));
      border:none; box-shadow: 0 8px 24px color-mix(in oklab, var(--accent) 35%, transparent);
      color: color-mix(in oklab, #06213c 90%, black); font-weight:600;
    }
    main{ margin-top:18px; display:grid; grid-template-columns: 1.2fr .8fr; gap:16px; }
    .card{ background: var(--card); border:1px solid color-mix(in oklab, var(--chip-border) 90%, var(--accent) 10%); border-radius:18px; padding:20px; backdrop-filter: var(--glass); box-shadow: 0 10px 40px var(--shadow); }
    .big{ font-size:96px; text-align:center; margin:8px 0 0; line-height:1.1; text-shadow: 0 8px 30px color-mix(in oklab, var(--accent) 25%, transparent); }
    .hint{ text-align:center; color:var(--muted); min-height:18px; margin:4px 0 10px; }
    .row{ display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; }
    input[type="text"]{
      width:320px; font-size:20px; padding:12px 14px; border-radius:14px;
      border:1px solid var(--chip-border); background:color-mix(in oklab, white 0%, var(--chip) 100%); color:var(--text); outline:none;
      box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--accent) 20%, transparent);
    }
    .stats{ display:flex; gap:10px; flex-wrap:wrap; }
    .pill{ display:inline-flex; align-items:center; gap:6px; padding:8px 10px; border-radius:999px; background:color-mix(in oklab, var(--chip) 100%, transparent); border:1px solid var(--chip-border); color:color-mix(in oklab, var(--text) 85%, white); font-size:12px;}
    .result{ text-align:center; margin-top:8px; min-height:28px; }
    .ok{ color:var(--ok);} .bad{ color:var(--bad);} .warn{ color:var(--warn);}
    .list{ display:grid; grid-template-columns: repeat(10,minmax(0,1fr)); gap:8px; margin-top:10px; }
    .item{ text-align:center; padding:6px 6px 10px; border-radius:10px; border:1px dashed var(--list-border); color:color-mix(in oklab, var(--text) 85%, white); background: var(--list-bg); display:flex; flex-direction:column; align-items:center; gap:6px;}
    .mini-bar{ width:100%; height:6px; background:color-mix(in oklab, var(--chip) 100%, white 0%); border:1px solid var(--chip-border); border-radius:999px; overflow:hidden;}
    .mini-bar>i{ display:block; height:100%; width:0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .25s ease; }
    .bar{ height:10px; background:color-mix(in oklab, var(--chip) 100%, white 0%); border:1px solid var(--chip-border); border-radius:999px; overflow:hidden; margin-top:10px;}
    .bar>i{ display:block; height:100%; width:0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); box-shadow: 0 0 20px color-mix(in oklab, var(--accent) 55%, transparent) inset; transition: width .35s ease; }
    .tiny{ font-size:12px; color:var(--muted); }
    footer{ margin-top:14px; text-align:center; color:var(--muted); }
    .kbd{ font-family: ui-monospace, Menlo, Consolas, monospace; background:color-mix(in oklab, var(--chip) 100%, white 0%); border:1px solid var(--chip-border); padding:2px 6px; border-radius:6px;}
    @media (max-width: 980px){ main{ grid-template-columns: 1fr; } .big{ font-size:72px; } .list{ grid-template-columns: repeat(8,minmax(0,1fr)); } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>韓文 40 音 — 關卡訓練</h1>
          <div class="tiny">快捷鍵：<span class="kbd">Enter</span> 檢查、<span class="kbd">Space</span> 播音、<span class="kbd">→</span> 下一題</div>
        </div>
      </div>
      <div class="controls">
        <!-- 主題 -->
        <select id="theme" title="主題">
          <option value="blue">藍色</option><option value="purple">紫霧</option><option value="mint">薄荷</option><option value="paper">紙感</option>
        </select>

        <!-- 模式 -->
        <select id="mode" title="模式">
          <option value="learn">教學模式</option>
          <option value="type">打字練習</option>
          <option value="listen">聽音拼寫</option>
          <option value="listen">配對模式</option>
        </select>

        <!-- 自由範圍 -->
        <select id="scope" title="自由範圍">
          <option value="vowels">母音（21）</option>
          <option value="consonants">子音（19）</option>
          <option value="cv">組合（CV 基礎）</option>
        </select>

        <!-- 關卡選擇（只顯示已解鎖） -->
        <select id="section" title="選擇關卡"></select>

        <label class="toggle" title="顯示提示（羅馬音）">
          <input id="hintToggle" type="checkbox" checked />
          <div class="track"><div class="dot"></div></div>
        </label>
        <label class="toggle" title="聲音（TTS/音效）">
          <input id="soundToggle" type="checkbox" checked />
          <div class="track"><div class="dot"></div></div>
        </label>
        <button id="shuffle">🔀 洗牌</button>
        <button id="reset">♻️ 重置成績</button>
        <button id="resetProgress">🧹 重置熟練度</button>
        <button id="map" class="primary">🗺️ 關卡地圖</button>
        <button id="challenge" class="primary">⏱️ 30 秒挑戰</button>
      </div>
    </header>

    <main>
      <section class="card">
        <div class="row" style="justify-content:space-between">
          <div class="stats" style="gap:8px; flex-wrap:wrap;">
            <span class="pill">正確率 <b id="acc">100%</b></span>
            <span class="pill">平均反應 <b id="avg">—</b> s</span>
            <span class="pill">Combo <b id="combo">0</b></span>
            <span class="pill">最佳連擊 <b id="best">0</b></span>
            <span class="pill">挑戰分數 <b id="score">0</b></span>
            <span class="pill" id="secInfo" title="當前關卡">關卡：自由練習</span>
          </div>
          <div class="row">
            <button id="speak">🔊 發音</button>
            <button id="slower">🐢 慢速</button>
            <button id="next">➡️ 下一個</button>
          </div>
        </div>

        <div id="char" class="big">ㅏ</div>
        <div id="hint" class="hint">a</div>

        <!-- 學習模式會隱藏 -->
        <div id="answerRow" class="row" style="margin-top:10px;">
          <input id="answer" type="text" placeholder="輸入羅馬音… (例如 a, eo, ga)" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="latin" />
          <button id="check" class="primary">✅ 檢查</button>
        </div>

        <div id="result" class="result"></div>
        <div class="bar" title="熟練度總覽"><i id="prog"></i></div>
        <div class="tiny" style="margin-top:8px;">提示：<span class="kbd">Enter</span> 檢查、<span class="kbd">Space</span> 播音、<span class="kbd">→</span> 下一題</div>
      </section>

      <aside class="card">
        <div class="row" style="justify-content:space-between">
          <b>本輪清單（依關卡或範圍）</b>
          <span class="tiny">每字答對 +1%（封頂 100%）</span>
        </div>
        <div id="list" class="list"></div>
      </aside>
    </main>

    <footer>© 2026 Hangul Trainer — Sections & Unlock Edition</footer>
  </div>

  <script>
    /* ========= 字表與羅馬音 ========= */
    const consonants = [
      {h:'ㄱ', r:'g'}, {h:'ㄲ', r:'kk'}, {h:'ㄴ', r:'n'}, {h:'ㄷ', r:'d'}, {h:'ㄸ', r:'tt'},
      {h:'ㄹ', r:'r'}, {h:'ㅁ', r:'m'}, {h:'ㅂ', r:'b'}, {h:'ㅃ', r:'pp'}, {h:'ㅅ', r:'s'},
      {h:'ㅆ', r:'ss'}, {h:'ㅇ', r:'ng'}, {h:'ㅈ', r:'j'}, {h:'ㅉ', r:'jj'}, {h:'ㅊ', r:'ch'},
      {h:'ㅋ', r:'k'}, {h:'ㅌ', r:'t'}, {h:'ㅍ', r:'p'}, {h:'ㅎ', r:'h'}
    ];
    const vowels = [
      {h:'ㅏ', r:'a'}, {h:'ㅑ', r:'ya'}, {h:'ㅓ', r:'eo'}, {h:'ㅕ', r:'yeo'}, {h:'ㅗ', r:'o'},
      {h:'ㅛ', r:'yo'}, {h:'ㅜ', r:'u'}, {h:'ㅠ', r:'yu'}, {h:'ㅡ', r:'eu'}, {h:'ㅣ', r:'i'},
      {h:'ㅐ', r:'ae'}, {h:'ㅒ', r:'yae'}, {h:'ㅔ', r:'e'}, {h:'ㅖ', r:'ye'}, {h:'ㅘ', r:'wa'},
      {h:'ㅙ', r:'wae'}, {h:'ㅚ', r:'oe'}, {h:'ㅝ', r:'wo'}, {h:'ㅞ', r:'we'}, {h:'ㅟ', r:'wi'},
      {h:'ㅢ', r:'ui'}
    ];
    const V_POOL = vowels.map(v=>({h:v.h,r:v.r,type:'v'}));
    const C_POOL = consonants.map(c=>({h:c.h,r:c.r,type:'c'}));
    const ROMAP = Object.fromEntries([...V_POOL, ...C_POOL].map(x=>[x.h,x.r]));

    /* ========= 10 個關卡 ========= */
    const sections = {
      s1: ['ㅏ','ㄱ','ㅣ','ㄴ'],
      s2: ['ㅑ','ㄷ','ㅡ','ㄹ'],
      s3: ['ㅓ','ㅁ','ㅔ','ㅂ'],
      s4: ['ㅕ','ㅅ','ㅐ','ㅇ'],
      s5: ['ㅗ','ㅈ','ㅛ','ㅊ'],
      s6: ['ㅜ','ㅋ','ㅠ','ㅎ'],
      s7: ['ㅚ','ㄲ','ㅘ','ㅌ'],
      s8: ['ㅝ','ㅞ','ㅟ','ㅍ'],
      s9: ['ㅖ','ㅒ','ㅙ','ㅃ'],
      s10:['ㅢ','ㅆ','ㅉ','ㄸ'],
    };

    /* ========= 快捷選取 ========= */
    const $ = s => document.querySelector(s);
    const charEl=$('#char'), hintEl=$('#hint'), ansRow=$('#answerRow'), ansEl=$('#answer'), resEl=$('#result');
    const accEl=$('#acc'), avgEl=$('#avg'), comboEl=$('#combo'), bestEl=$('#best'), scoreEl=$('#score'), progEl=$('#prog');
    const listEl=$('#list'), themeSel=$('#theme'), secSel=$('#section'), secInfo=$('#secInfo');

    /* ========= 狀態／保存 ========= */
    let mode='learn', scope='vowels', soundOn=true, showHint=true;
    let base=[], pool=[], hard=[];
    let current=null, startTime=null;
    let stats = JSON.parse(localStorage.getItem('hangul-blue-stats')||'null') || {ok:0,total:0,t:[],combo:0,best:0,score:0};
    let progress = JSON.parse(localStorage.getItem('hangul-progress-v1')||'null') || {};
    let unlocked = JSON.parse(localStorage.getItem('hangul-section-unlock-v1')||'null') || initUnlock();
    let secBestCombo = JSON.parse(localStorage.getItem('hangul-section-bestcombo-v1')||'null') || {};
    let currentSection = null;

    // ✅ 重要修正：在任何使用前就宣告（全域單一份）
    let progressEls = new Map();

    // 主題
    const savedTheme = localStorage.getItem('hangul-theme') || 'blue';
    applyTheme(savedTheme);
    if (themeSel) themeSel.value = savedTheme;

    /* ========= 綁定 ========= */
    if (themeSel) themeSel.addEventListener('change', e=> applyTheme(e.target.value));
    const modeSel = $('#mode'); if (modeSel) modeSel.addEventListener('change', e=>{ mode=e.target.value; syncMode(); });
    const scopeSel = $('#scope'); if (scopeSel) scopeSel.addEventListener('change', e=> setFreeScope(e.target.value));
    const hintT = $('#hintToggle'); if (hintT) hintT.addEventListener('change', e=>{ showHint=e.target.checked; if(hintEl) hintEl.style.visibility= showHint?'visible':'hidden'; });
    const soundT = $('#soundToggle'); if (soundT) soundT.addEventListener('change', e=>{ soundOn=e.target.checked; });
    const btnShuffle = $('#shuffle'); if (btnShuffle) btnShuffle.addEventListener('click', ()=>{ pool=shuffle([...base]); hard=[]; renderList(); next(); });
    const btnReset = $('#reset'); if (btnReset) btnReset.addEventListener('click', ()=>{ stats={ok:0,total:0,t:[],combo:0,best:0,score:0}; saveStats(); updateStats(); if(progEl) progEl.style.width='0%'; toast('成績已重置','warn'); });
    const btnResetP = $('#resetProgress'); if (btnResetP) btnResetP.addEventListener('click', ()=>{ if(confirm('確定清空所有熟練度進度？')){ progress={}; saveProgress(); renderList(); toast('熟練度已清空','warn'); }});
    const btnMap = $('#map'); if (btnMap) btnMap.addEventListener('click', ()=> location.href='sections.html');
    const btnSpeak = $('#speak'); if (btnSpeak) btnSpeak.addEventListener('click', ()=> speak(getSpeakText(current),1));
    const btnSlow = $('#slower'); if (btnSlow) btnSlow.addEventListener('click', ()=> speak(getSpeakText(current),0.85));
    const btnNext = $('#next'); if (btnNext) btnNext.addEventListener('click', next);
    const btnCheck = $('#check'); if (btnCheck) btnCheck.addEventListener('click', check);

    if (ansEl) ansEl.addEventListener('keydown', (e) => { if (e.key==='Enter' && !e.isComposing){ e.preventDefault(); check(); }});
    window.addEventListener('keydown', (e)=>{
      if (e.isComposing) return;
      const tag=(e.target?.tagName||'').toLowerCase();
      const inInput = tag==='input'||tag==='textarea'||e.target?.isContentEditable;
      const key=e.key, code=e.code;
      const isSpace = key===' '||key==='Space'||key==='Spacebar'||code==='Space';
      if(isSpace && !inInput){ e.preventDefault(); if(current) speak(getSpeakText(current),1); }
      if(key==='Enter' && !inInput){ if(mode!=='learn'){ e.preventDefault(); check(); } }
      if(key==='ArrowRight' && !inInput){ e.preventDefault(); next(); }
    }, {capture:true, passive:false});

    /* ========= 主題 ========= */
    function applyTheme(name){
      const theme = ['blue','purple','mint','paper'].includes(name)?name:'blue';
      document.body.setAttribute('data-theme', theme==='blue'?'':theme);
      localStorage.setItem('hangul-theme', theme);
    }

    /* ========= 範圍／關卡 ========= */
    function setFreeScope(val){
      currentSection = null;
      if (secInfo) secInfo.textContent = '關卡：自由練習';
      if (secSel) secSel.value = '';
      scope = val;
      if(scope==='vowels'){ base=[...V_POOL]; }
      else if(scope==='consonants'){ base=[...C_POOL]; }
      else { // cv：子音 × 核心母音
        const coreVowels = ['ㅏ','ㅓ','ㅗ','ㅜ','ㅡ','ㅣ'];
        const cMap = Object.fromEntries(consonants.map(x=>[x.h,x.r]));
        const vMap = Object.fromEntries(vowels.map(x=>[x.h,x.r]));
        function combineCV(c, v) {
          const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
          const JUNG= ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
          const SBase=0xAC00,LCount=19,VCount=21,TCount=28,NCount=VCount*TCount;
          const LIndex=CHO.indexOf(c), VIndex=JUNG.indexOf(v); if(LIndex<0||VIndex<0) return c+v;
          return String.fromCharCode(SBase + (LIndex*NCount) + (VIndex*TCount));
        }
        function romanizeCV(c, v){ return (cMap[c]||'') + (vMap[v]||''); }
        base = [];
        consonants.forEach(c=> coreVowels.forEach(v=> base.push({h:combineCV(c.h,v), r:romanizeCV(c.h,v), type:'cv'})));
      }
      pool=[...base]; hard=[]; renderList(); next();
    }

    function buildSectionSelect(){
      if(!secSel) return;
      secSel.innerHTML = '';
      const opt0 = document.createElement('option');
      opt0.value=''; opt0.textContent='（選擇關卡訓練）';
      secSel.appendChild(opt0);
      for(const key of Object.keys(sections)){
        const o = document.createElement('option');
        const idx = key.replace('s','');
        o.value = key;
        const locked = !unlocked[key];
        o.disabled = locked;
        o.textContent = locked ? `🔒 S${idx}` : `S${idx}`;
        secSel.appendChild(o);
      }
      secSel.addEventListener('change', e=>{
        const val=e.target.value;
        if(!val){ setFreeScope(scope); return; }
        if(!unlocked[val]){ alert('尚未解鎖此關卡'); e.target.value=''; return; }
        setSection(val);
      });
    }

    function setSection(key){
      currentSection = key;
      const chars = sections[key];
      base = chars.map(h => ({h, r: ROMAP[h]}));
      pool=[...base]; hard=[];
      if (secInfo) secInfo.textContent = `關卡：S${key.replace('s','')}`;
      renderList(); next();
      if(!secBestCombo[key]){ secBestCombo[key]=0; saveSecBest(); }
      if (secSel) secSel.value = key;
    }

    /* ========= 模式 ========= */
    function syncMode(){
      if(mode==='match'){
  ansRow.style.display = 'none'; // 隱藏打字
  showMatchUI();
  return;
}
      if(mode==='learn'){
        if(ansRow) ansRow.style.display='none';
        if(ansEl){ ansEl.disabled=true; ansEl.value=''; }
        if(hintEl) hintEl.style.visibility='visible';
      }else{
        if(ansRow) ansRow.style.display='flex';
        if(ansEl){ ansEl.disabled=false; setTimeout(()=> ansEl.focus(), 0); }
        if(hintEl) hintEl.style.visibility='hidden';
      }
    }
    function showMatchUI(){
  // 暫時只顯示提示，下一步先加配對玩法
  listEl.innerHTML = `
    <div style="
      opacity:.7;
      padding:20px;
      text-align:center;
      border:1px dashed rgba(255,255,255,.3);
      border-radius:12px;
    ">
      🔗 配對模式（開發中）
    </div>
  `;
}


    /* ========= 清單（含每字熟練條） ========= */
    function renderList(){
      if(!listEl) return;
      listEl.innerHTML=''; progressEls.clear();
      base.forEach(x=>{
        const b = progress[x.h]||0;
        const box = document.createElement('div'); box.className='item'; box.dataset.roman = x.r;
        const ch = document.createElement('div'); ch.textContent=x.h; ch.style.fontSize='28px';
        const bar = document.createElement('div'); bar.className='mini-bar';
        const fill = document.createElement('i'); fill.style.width = Math.min(100,b)+'%';
        bar.appendChild(fill); box.appendChild(ch); box.appendChild(bar);
        listEl.appendChild(box);
        progressEls.set(x.h, fill);
      });
    }

    /* ========= 出題／檢查 ========= */
    function pick(){
  // 非關卡模式，原本玩法
  if(!currentSection){
    const bag=[...pool, ...hard, ...hard];
    return bag[Math.floor(Math.random()*bag.length)];
  }

  // 關卡模式：80% 本關 + 20% 舊關
  const r = Math.random();
  if(r < 0.8){
    return pool[Math.floor(Math.random()*pool.length)];
  }

  // 舊關卡字（已解鎖）
  const prevChars = [];
  const currIndex = parseInt(currentSection.replace('s',''), 10);

  for(let i=1;i<currIndex;i++){
    sections['s'+i].forEach(h=>{
      prevChars.push({ h, r: ROMAP[h] });
    });
  }

  if(prevChars.length===0){
    return pool[Math.floor(Math.random()*pool.length)];
  }

  return prevChars[Math.floor(Math.random()*prevChars.length)];
}
    function next(){
      current = pick(); if(!current) return;
      if (charEl) charEl.textContent=current.h;
      if (hintEl) hintEl.textContent=current.r;
      if (resEl) resEl.textContent='';
      if (ansEl) ansEl.value='';
      startTime=performance.now();
      if (mode!=='type') speak(getSpeakText(current),1);
    }
    function getSpeakText(item){ return item?.h||''; }

    function check(){
      if(!current || !ansEl) return;
      const resp=ansEl.value.trim().toLowerCase();
      const correct=current.r;
      const dt=(performance.now()-startTime)/1000;
      stats.total++; stats.t.push(dt);

      if(resp===correct){
        stats.ok++; stats.combo++; stats.best=Math.max(stats.best, stats.combo);
        if(currentSection){ secBestCombo[currentSection]=Math.max(secBestCombo[currentSection]||0, stats.combo); saveSecBest(); }
        if (resEl) resEl.innerHTML=`<span class="ok">✅ 正確！${correct}</span> <span class="tiny">用時 ${dt.toFixed(2)}s</span>`;
        feedback(true); bumpProgress();

        const key=current.h;
        const nv=Math.min(100,(progress[key]||0)+1); progress[key]=nv; saveProgress();
        const el=progressEls.get(key); if(el) el.style.width=nv+'%';

        maybeUnlockNext();
        setTimeout(next, 420);
      }else{
        stats.combo=0;
        if (resEl) resEl.innerHTML=`<span class="bad">❌ ${resp||'（空白）'} → 正解：${correct}</span>`;
        hard.push(current); feedback(false);
        setTimeout(()=> speak(getSpeakText(current),0.85), 160);
        setTimeout(next, 650);
      }
      saveStats(); updateStats();
    }

    /* ========= 解鎖：每字 ≥80% ＋ 該關最佳連擊 ≥15 ========= */
    function canUnlockSection(key){
      const chars = sections[key]; if(!chars) return false;
      const okBar = chars.every(h => (progress[h]||0) >= 50);
      const okCombo = (secBestCombo[key]||0) >= 15;
      return okBar && okCombo;
    }
    function nextKey(k){ const idx=parseInt(k.replace('s',''),10); return 's'+(idx+1); }
    function maybeUnlockNext(){
      if(!currentSection) return;
      const curKey=currentSection;
      if(!unlocked[curKey]) return;
      const nxt = nextKey(curKey);
      if(!sections[nxt] || unlocked[nxt]) return;
      if(canUnlockSection(curKey)){
        unlocked[nxt]=true; saveUnlock();
        toast(`🎉 關卡 S${nxt.replace('s','')} 已解鎖！`, 'ok');
        buildSectionSelect();
        confetti();
      }
    }

    /* ========= 統計／存取 ========= */
    function bumpProgress(){ if(!progEl) return; const p=Math.min(100,(stats.ok/Math.max(1,stats.total))*100); progEl.style.width=p+'%'; }
    function updateStats(){
      if(!accEl||!avgEl||!comboEl||!bestEl||!scoreEl) return;
      const acc = stats.total? Math.round(stats.ok/stats.total*100):100;
      accEl.textContent=acc+'%';
      const avg=stats.t.length? (stats.t.reduce((a,b)=>a+b,0)/stats.t.length):0;
      avgEl.textContent=avg? avg.toFixed(2):'—';
      comboEl.textContent=stats.combo; bestEl.textContent=stats.best; scoreEl.textContent=stats.score;
    }
    function saveStats(){ localStorage.setItem('hangul-blue-stats', JSON.stringify(stats)); }
    function saveProgress(){ localStorage.setItem('hangul-progress-v1', JSON.stringify(progress)); }
    function initUnlock(){ const obj={}; Object.keys(sections).forEach(k=>obj[k]=false); obj.s1=true; localStorage.setItem('hangul-section-unlock-v1', JSON.stringify(obj)); return obj; }
    function saveUnlock(){ localStorage.setItem('hangul-section-unlock-v1', JSON.stringify(unlocked)); }
    function saveSecBest(){ localStorage.setItem('hangul-section-bestcombo-v1', JSON.stringify(secBestCombo)); }
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } return a }

    /* ========= 視覺 / 音效（簡版） ========= */
    function feedback(ok){ if(soundOn) (ok?beep(880,.08):beep(220,.12)); }
    function beep(freq=440,dur=0.1){ try{ const ctx=new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(), g=ctx.createGain(); o.type='sine'; o.frequency.value=freq; o.connect(g); g.connect(ctx.destination); g.gain.setValueAtTime(.001,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.2,ctx.currentTime+.01); o.start(); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur); o.stop(ctx.currentTime+dur+.01);}catch(e){} }
    function confetti(){ /* 可加動畫；暫留空以減少干擾 */ }

    /* ========= TTS ========= */
    function speak(text, rate=1){ if(!('speechSynthesis' in window) || !soundOn) return; const u=new SpeechSynthesisUtterance(text); u.lang='ko-KR'; u.rate=rate; const vs=speechSynthesis.getVoices(); const ko=vs.find(v=> v.lang?.toLowerCase().startsWith('ko')); if(ko) u.voice=ko; speechSynthesis.cancel(); speechSynthesis.speak(u); }

    function toast(msg,type='ok'){ if(!resEl) return; resEl.innerHTML=`<span class="${type==='ok'?'ok':type==='warn'?'warn':'bad'}">◦ ${msg}</span>`; }

    /* ========= 關卡選單 → 根據解鎖狀態構建 ========= */
    function initSectionsFromURL(){
      buildSectionSelect();
      const urlSec = new URLSearchParams(location.search).get('section');
      if (urlSec && sections[urlSec]) { setSection(urlSec); } else { setFreeScope('vowels'); }
    }

    /* ========= 重要：等待 DOM 準備好才初始化（避免次序錯誤） ========= */
    window.addEventListener('DOMContentLoaded', () => {
      initSectionsFromURL();
      syncMode();
      renderList();
      next();
      updateStats();
      // 初次問候音
      setTimeout(()=>{ speak('안녕하세요',1); }, 400);
    });
  </script>
